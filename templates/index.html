<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Óculos - Luxury Eyewear</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: #1a1a1a; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        .hero { 
            background: #262626; 
            padding: 50px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #d4af37; 
            max-width: 450px; 
        }
        
        /* Logótipo redondo e pequeno como no catálogo */
        .logo-premium {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        
        h1 { color: #d4af37; letter-spacing: 3px; text-transform: uppercase; margin: 10px 0; }
        p { color: #888; margin-bottom: 30px; font-style: italic; }

        .btn-entrar { 
            background-color: #d4af37; 
            color: #1a1a1a; 
            padding: 15px 35px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            display: inline-block; 
            transition: 0.3s; 
            text-transform: uppercase;
        }
        .btn-entrar:hover { background-color: transparent; color: #d4af37; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="hero">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-premium">
        <h1>Super Óculos</h1>
        <p>A exclusividade que os seus olhos merecem.</p>
        <a href="/produtos" class="btn-entrar">Explorar Coleção</a>
    </div>
</body>
</html>
