<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Catálogo Premium - Super Óculos</title>
    <style>
        /* Cores de Luxo: Preto Mate (#1a1a1a) e Dourado (#d4af37) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1a1a1a; color: #fff; padding: 50px; }
        
        .container { background: #262626; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #d4af37; }
        
        /* Estilo para o Logótipo Pequeno e Redondo */
        .logo-premium {
            width: 100px; /* Tamanho pequeno e elegante */
            height: 100px;
            border-radius: 50%; /* Faz a imagem ficar redonda */
            object-fit: cover; /* Garante que a imagem não distorce */
            border: 2px solid #d4af37; /* Moldura dourada */
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        h1 { color: #d4af37; letter-spacing: 2px; text-transform: uppercase; }

        .produto { margin-bottom: 40px; padding: 20px; transition: transform 0.3s; }

        /* Efeito de Zoom na Imagem dos Óculos */
        .img-container { overflow: hidden; border-radius: 15px; width: 250px; margin: 0 auto 15px auto; border: 2px solid #333; }
        .img-produto { width: 100%; transition: transform 0.5s ease; display: block; }
        .img-produto:hover { transform: scale(1.2); }

        .preco { font-size: 1.4em; color: #d4af37; font-weight: bold; margin: 10px 0; }

        /* Botão Dourado */
        .btn-encomenda { 
            background-color: #d4af37; color: #1a1a1a; padding: 12px 25px; 
            text-decoration: none; border-radius: 50px; font-weight: bold; 
            display: inline-block; transition: 0.3s; border: 2px solid #d4af37;
        }
        .btn-encomenda:hover { background-color: transparent; color: #d4af37; }

        .voltar { color: #888; text-decoration: none; display: block; margin-top: 30px; font-size: 0.9em; }
        .voltar:hover { color: #d4af37; }
    </style>
</head>
<body>
    <div class="container">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logótipo Super Óculos" class="logo-premium">
        
        <p style="color: #888;">Coleção Exclusiva</p>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div class="produto">
            <div class="img-container">
                <img src="{{ url_for('static', filename='images/oculos1.png') }}" alt="Aviador" class="img-produto">
            </div>
            <p><strong>🕶️ Aviador Gold Edition</strong></p>
            <p class="preco">49,90€</p>
            <a href="/encomenda" class="btn-encomenda">Solicitar Reserva</a>
        </div>

        <div class="produto">
            <div class="img-container">
                <img src="{{ url_for('static', filename='images/oculos2.png') }}" alt="Modern" class="img-produto">
            </div>
            <p><strong>👓 Modern Black Matte</strong></p>
            <p class="preco">29,90€</p>
            <a href="/encomenda" class="btn-encomenda">Solicitar Reserva</a>
        </div>

        <a href="/" class="voltar">← Voltar à página principal</a>
    </div>
</body>
</html>
